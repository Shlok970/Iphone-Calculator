<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link href = "style.css" rel = "stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class = "input"><input readonly></div>
        <div class="row">
            <button class = "grey"><i class="fa-solid fa-delete-left"></i></button>
            <button class = "grey">AC</button>
            <button class = "grey">%</button>
            <button class = "orange">/</button>
        </div>
        <div class="row">
            <button class = "dgrey">7</button>
            <button class = "dgrey">8</button>
            <button class = "dgrey">9</button>
            <button class = "orange">x</button>
        </div>
        <div class="row">
            <button class = "dgrey">4</button>
            <button class = "dgrey">5</button>
            <button class = "dgrey">6</button>
            <button class = "orange">-</button>
        </div>
        <div class="row">
            <button class = "dgrey">1</button>
            <button class = "dgrey">2</button>
            <button class = "dgrey">3</button>
            <button class = "orange">+</button>
        </div>
        <div class="row">
            <button class = "dgrey band">close</button>
            <button class = "dgrey">0</button>
            <button class = "dgrey">.</button>
            <button class = "orange">=</button>
        </div>
    </div>
<script src="index.js"></script>
</body>
</html>
